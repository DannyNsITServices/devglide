name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch, minor, major) or explicit version (e.g. 0.2.0)"
        required: true
        default: "patch"
        type: string
      dry-run:
        description: "Dry run (publish without actually uploading)"
        required: false
        default: false
        type: boolean

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  publish:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Bump version
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version ${{ inputs.version }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_BRANCH=release/v${VERSION}" >> "$GITHUB_ENV"
          # main is protected (requires a PR), so commit to a release branch and merge via PR.
          git switch -c "release/v${VERSION}"
          git add package.json
          git commit -m "release: v${VERSION}"
          git tag "v${VERSION}"

      - name: Publish to npm
        run: |
          if [ "${{ inputs.dry-run }}" = "true" ]; then
            npm publish --dry-run --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Push release branch and tag, open auto-merge PR
        if: ${{ inputs.dry-run != true }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git push origin "${RELEASE_BRANCH}"
          git push origin --tags
          # gh CLI is not installed on the self-hosted runner — open the PR + enable
          # auto-merge via the GitHub API (Node global fetch) instead.
          node .github/scripts/open-release-pr.mjs
