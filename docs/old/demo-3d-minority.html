<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevGlide - Minority Report Interface</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   MINORITY REPORT GESTURE INTERFACE — DevGlide Dashboard
   Transparent floating panels, gesture trails, push/pull physics
   ═══════════════════════════════════════════════════════════════ */

*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-deep: #050508;
  --bg-mid: #0a0a14;
  --glass: rgba(255, 255, 255, 0.03);
  --glass-hover: rgba(255, 255, 255, 0.06);
  --glass-active: rgba(255, 255, 255, 0.09);
  --glass-pulled: rgba(255, 255, 255, 0.12);
  --border: rgba(255, 255, 255, 0.06);
  --border-hover: rgba(255, 255, 255, 0.12);
  --border-active: rgba(255, 255, 255, 0.22);
  --text-primary: rgba(255, 255, 255, 1.0);
  --text-secondary: rgba(255, 255, 255, 0.6);
  --text-tertiary: rgba(255, 255, 255, 0.3);
  --text-ghost: rgba(255, 255, 255, 0.12);
  --accent: #4488cc;
  --accent-dim: rgba(68, 136, 204, 0.15);
  --accent-glow: rgba(68, 136, 204, 0.4);
  --accent-bright: rgba(68, 136, 204, 0.7);
  --line: rgba(255, 255, 255, 0.08);
  --line-glow: rgba(255, 255, 255, 0.30);
  --font-ui: 'Outfit', -apple-system, sans-serif;
  --font-data: 'JetBrains Mono', 'Fira Code', monospace;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg-deep);
  font-family: var(--font-ui);
  color: var(--text-primary);
  cursor: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── Ambient Fog / Atmosphere ─── */
#atmosphere {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% 42%, rgba(68, 136, 204, 0.035) 0%, transparent 70%),
    radial-gradient(ellipse 100% 70% at 50% 48%, rgba(255, 255, 255, 0.012) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 30% 35%, rgba(68, 136, 204, 0.015) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 70% 35%, rgba(68, 136, 204, 0.015) 0%, transparent 60%),
    linear-gradient(180deg, var(--bg-mid) 0%, var(--bg-deep) 100%);
  pointer-events: none;
  z-index: 0;
}

/* Animated atmosphere breathing */
#atmosphere::after {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 60% 40% at 50% 45%, rgba(68, 136, 204, 0.02) 0%, transparent 70%);
  animation: breathe 8s ease-in-out infinite;
  pointer-events: none;
}

@keyframes breathe {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

/* ─── Scanline Overlay ─── */
#scanline {
  position: fixed;
  inset: 0;
  z-index: 9998;
  pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0, 0, 0, 0.025) 2px,
    rgba(0, 0, 0, 0.025) 4px
  );
}

/* ─── Particle Layer ─── */
#particleCanvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
}

/* ─── Gesture Trail Canvas ─── */
#gestureCanvas {
  position: fixed;
  inset: 0;
  z-index: 10000;
  pointer-events: none;
}

/* ─── Custom Cursor ─── */
#cursor {
  position: fixed;
  width: 22px;
  height: 22px;
  border: 1.5px solid rgba(255, 255, 255, 0.45);
  border-radius: 50%;
  pointer-events: none;
  z-index: 10001;
  transform: translate(-50%, -50%);
  transition: width 0.25s cubic-bezier(0.23, 1, 0.32, 1),
              height 0.25s cubic-bezier(0.23, 1, 0.32, 1),
              border-color 0.25s ease,
              background 0.25s ease;
}

#cursor.hovering {
  width: 40px;
  height: 40px;
  border-color: var(--accent);
  background: rgba(68, 136, 204, 0.06);
}

#cursor.pressing {
  width: 16px;
  height: 16px;
  border-color: var(--accent-bright);
  background: rgba(68, 136, 204, 0.15);
}

#cursor-dot {
  position: fixed;
  width: 3px;
  height: 3px;
  background: rgba(255, 255, 255, 0.9);
  border-radius: 50%;
  pointer-events: none;
  z-index: 10002;
  transform: translate(-50%, -50%);
}

/* Cursor crosshairs */
#cursor-cross {
  position: fixed;
  width: 60px;
  height: 60px;
  pointer-events: none;
  z-index: 10000;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 0.3s ease;
}

#cursor-cross.visible {
  opacity: 1;
}

#cursor-cross::before,
#cursor-cross::after {
  content: '';
  position: absolute;
  background: rgba(68, 136, 204, 0.15);
}

#cursor-cross::before {
  width: 1px;
  height: 100%;
  left: 50%;
  top: 0;
}

#cursor-cross::after {
  width: 100%;
  height: 1px;
  top: 50%;
  left: 0;
}

/* ─── Scene Container ─── */
#scene-wrapper {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}

#scene {
  width: 100%;
  height: 100%;
  perspective: 900px;
  perspective-origin: 50% 45%;
  transition: perspective 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}

#scene-inner {
  width: 100%;
  height: 100%;
  transform-style: preserve-3d;
  position: relative;
}

/* ─── Glass Panel Base ─── */
.glass-panel {
  position: absolute;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 6px;
  backdrop-filter: blur(16px) saturate(1.1);
  -webkit-backdrop-filter: blur(16px) saturate(1.1);
  padding: 20px;
  transform-style: preserve-3d;
  will-change: transform, opacity;
  opacity: 0;
  animation: panelBoot 1.4s cubic-bezier(0.23, 1, 0.32, 1) forwards;
  overflow: hidden;
}

/* Panel shimmer edge — top light reflection */
.glass-panel::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 1px;
  background: linear-gradient(90deg,
    transparent 10%,
    rgba(255, 255, 255, 0.08) 30%,
    rgba(255, 255, 255, 0.12) 50%,
    rgba(255, 255, 255, 0.08) 70%,
    transparent 90%
  );
  pointer-events: none;
}

/* Inner glow on active */
.glass-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 6px;
  opacity: 0;
  background: radial-gradient(ellipse at center, rgba(68, 136, 204, 0.04) 0%, transparent 70%);
  transition: opacity 0.4s ease;
  pointer-events: none;
}

.glass-panel.active::after {
  opacity: 1;
}

.glass-panel.active {
  background: var(--glass-active);
  border-color: var(--border-active);
  box-shadow:
    0 0 60px rgba(68, 136, 204, 0.04),
    0 0 20px rgba(68, 136, 204, 0.02),
    inset 0 0 40px rgba(255, 255, 255, 0.015);
}

.glass-panel.pulled {
  background: var(--glass-pulled);
  border-color: rgba(68, 136, 204, 0.25);
  box-shadow:
    0 0 80px rgba(68, 136, 204, 0.06),
    0 8px 32px rgba(0, 0, 0, 0.3),
    inset 0 0 50px rgba(255, 255, 255, 0.02);
}

@keyframes panelBoot {
  0% {
    opacity: 0;
    filter: blur(8px);
  }
  40% {
    filter: blur(2px);
  }
  100% {
    opacity: var(--target-opacity, 1);
    filter: blur(0px);
  }
}

/* ─── Panel Header ─── */
.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
  font-size: 10px;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: 2.5px;
  color: var(--text-tertiary);
  user-select: none;
}

.panel-header .dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.5;
  animation: headerDotPulse 3s ease-in-out infinite;
}

@keyframes headerDotPulse {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 0.8; }
}

.panel-header .id-tag {
  margin-left: auto;
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-ghost);
  letter-spacing: 1px;
}

/* ─── Stat Panels ─── */
.stat-value {
  font-family: var(--font-data);
  font-size: 36px;
  font-weight: 300;
  color: var(--text-primary);
  line-height: 1;
  margin-bottom: 6px;
  letter-spacing: -1px;
}

.stat-label {
  font-size: 12px;
  font-weight: 300;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.stat-change {
  font-family: var(--font-data);
  font-size: 10px;
  color: var(--accent);
  opacity: 0.6;
  margin-top: 6px;
}

.stat-sparkline {
  margin-top: 10px;
  height: 20px;
  display: flex;
  align-items: flex-end;
  gap: 2px;
}

.stat-sparkline .bar {
  flex: 1;
  background: var(--accent);
  opacity: 0.2;
  border-radius: 1px 1px 0 0;
  transition: opacity 0.3s ease;
}

.glass-panel.active .stat-sparkline .bar,
.glass-panel.pulled .stat-sparkline .bar {
  opacity: 0.4;
}

/* ─── Activity Feed ─── */
.activity-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.025);
  font-size: 11px;
  color: var(--text-secondary);
  line-height: 1.45;
}

.activity-item:last-child {
  border-bottom: none;
}

.activity-time {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-tertiary);
  white-space: nowrap;
  min-width: 32px;
  padding-top: 2px;
}

.activity-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0.35;
  margin-top: 5px;
  flex-shrink: 0;
}

.activity-text {
  flex: 1;
}

.activity-text .tool-name {
  color: var(--accent);
  opacity: 0.7;
}

/* ─── Kanban Summary ─── */
.kanban-col {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255, 255, 255, 0.025);
  font-size: 11px;
}

.kanban-col:last-child { border-bottom: none; }

.kanban-col-name {
  color: var(--text-secondary);
  font-weight: 300;
  min-width: 70px;
  font-size: 11px;
}

.kanban-col-bar-track {
  flex: 1;
  height: 3px;
  background: rgba(255, 255, 255, 0.03);
  border-radius: 2px;
  overflow: hidden;
  max-width: 60px;
}

.kanban-col-bar {
  height: 100%;
  background: var(--accent);
  opacity: 0.35;
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.23, 1, 0.32, 1);
}

.kanban-col-count {
  font-family: var(--font-data);
  font-size: 12px;
  color: var(--text-primary);
  opacity: 0.7;
  min-width: 20px;
  text-align: right;
}

/* ─── Chart Area ─── */
.chart-container {
  width: 100%;
  height: calc(100% - 36px);
  position: relative;
}

.chart-container svg {
  width: 100%;
  height: 100%;
}

/* ─── SVG Connection Lines ─── */
#connections-svg {
  position: fixed;
  inset: 0;
  z-index: 3;
  pointer-events: none;
}

#connections-svg line {
  stroke: var(--line);
  stroke-width: 0.6;
  stroke-dasharray: 4 6;
  transition: stroke 0.5s ease, stroke-width 0.5s ease, stroke-dasharray 0.5s ease;
}

#connections-svg line.glow {
  stroke: var(--accent);
  stroke-opacity: 0.4;
  stroke-width: 1;
  stroke-dasharray: none;
}

/* ─── Connection Anchor Dots ─── */
.conn-dot {
  position: absolute;
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.08);
  transition: background 0.4s ease, box-shadow 0.4s ease, transform 0.4s ease;
  z-index: 5;
}

.conn-dot.glow {
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
  transform: scale(1.5);
}

/* ─── Timeline Scrubber ─── */
#timeline {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 72px;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, transparent 0%, rgba(5, 5, 8, 0.7) 30%, rgba(5, 5, 8, 0.95) 100%);
}

#timeline-track {
  display: flex;
  align-items: flex-start;
  gap: 0;
  width: 76%;
  max-width: 860px;
  height: 52px;
  position: relative;
  padding-top: 8px;
}

.timeline-node {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: none;
  transition: transform 0.3s ease, opacity 0.3s ease;
  opacity: 0.3;
  position: relative;
}

.timeline-node.active {
  opacity: 1;
}

.timeline-node .node-pip {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  border: 1px solid rgba(255, 255, 255, 0.15);
  background: transparent;
  transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
}

.timeline-node.active .node-pip {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 14px var(--accent-glow), 0 0 4px var(--accent);
}

/* Ripple ring on active nodes */
.timeline-node.active .node-pip::after {
  content: '';
  position: absolute;
  inset: -6px;
  border-radius: 50%;
  border: 1px solid var(--accent);
  opacity: 0;
  animation: nodeRipple 2s ease-out infinite;
}

@keyframes nodeRipple {
  0% { transform: scale(0.5); opacity: 0.6; }
  100% { transform: scale(1.8); opacity: 0; }
}

.timeline-node-label {
  font-size: 8px;
  font-weight: 400;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
  white-space: nowrap;
}

.timeline-node.active .timeline-node-label {
  color: var(--text-secondary);
}

.timeline-node-date {
  font-family: var(--font-data);
  font-size: 7px;
  color: var(--text-ghost);
  letter-spacing: 0.5px;
}

.timeline-line {
  position: absolute;
  top: 12px;
  left: 7%;
  right: 7%;
  height: 1px;
  background: rgba(255, 255, 255, 0.04);
  z-index: -1;
}

#timeline-progress {
  position: absolute;
  top: 12px;
  left: 7%;
  height: 1px;
  background: linear-gradient(90deg, var(--accent), rgba(68, 136, 204, 0.3));
  transition: width 0.5s cubic-bezier(0.23, 1, 0.32, 1);
  z-index: -1;
}

/* ─── Zoom Controls ─── */
#zoom-controls {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  z-index: 200;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.zoom-btn {
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text-tertiary);
  font-family: var(--font-data);
  font-size: 15px;
  cursor: none;
  transition: all 0.3s ease;
  user-select: none;
}

.zoom-btn:hover {
  background: var(--glass-hover);
  border-color: var(--border-hover);
  color: var(--text-secondary);
}

.zoom-label {
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-ghost);
  text-align: center;
  padding: 4px 0;
  letter-spacing: 0.5px;
}

/* ─── Top Bar ─── */
#top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 44px;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  background: linear-gradient(180deg, rgba(10, 10, 20, 0.6) 0%, transparent 100%);
}

.brand {
  font-size: 12px;
  font-weight: 300;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--text-tertiary);
}

.brand span { color: var(--accent); opacity: 0.5; }

.top-center {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-ghost);
  letter-spacing: 2px;
  text-transform: uppercase;
}

.status {
  font-family: var(--font-data);
  font-size: 9px;
  color: var(--text-tertiary);
  letter-spacing: 1.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.live-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: #44cc88;
  animation: livePulse 2s ease-in-out infinite;
}

@keyframes livePulse {
  0%, 100% { opacity: 0.3; box-shadow: none; }
  50% { opacity: 1; box-shadow: 0 0 6px rgba(68, 204, 136, 0.4); }
}

/* ─── Corner Brackets (cinematic framing) ─── */
.corner-bracket {
  position: fixed;
  width: 30px;
  height: 30px;
  z-index: 99;
  pointer-events: none;
}

.corner-bracket::before,
.corner-bracket::after {
  content: '';
  position: absolute;
  background: rgba(255, 255, 255, 0.06);
}

.corner-bracket.tl { top: 16px; left: 16px; }
.corner-bracket.tl::before { width: 20px; height: 1px; top: 0; left: 0; }
.corner-bracket.tl::after { width: 1px; height: 20px; top: 0; left: 0; }

.corner-bracket.tr { top: 16px; right: 16px; }
.corner-bracket.tr::before { width: 20px; height: 1px; top: 0; right: 0; }
.corner-bracket.tr::after { width: 1px; height: 20px; top: 0; right: 0; }

.corner-bracket.bl { bottom: 80px; left: 16px; }
.corner-bracket.bl::before { width: 20px; height: 1px; bottom: 0; left: 0; }
.corner-bracket.bl::after { width: 1px; height: 20px; bottom: 0; left: 0; }

.corner-bracket.br { bottom: 80px; right: 16px; }
.corner-bracket.br::before { width: 20px; height: 1px; bottom: 0; right: 0; }
.corner-bracket.br::after { width: 1px; height: 20px; bottom: 0; right: 0; }

/* ─── Mouse Velocity Indicator ─── */
#velocity-indicator {
  position: fixed;
  bottom: 82px;
  left: 28px;
  z-index: 100;
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-ghost);
  letter-spacing: 1px;
  pointer-events: none;
}

/* ─── Perspective readout ─── */
#perspective-readout {
  position: fixed;
  bottom: 82px;
  right: 28px;
  z-index: 100;
  font-family: var(--font-data);
  font-size: 8px;
  color: var(--text-ghost);
  letter-spacing: 1px;
  pointer-events: none;
}

/* ─── Scrollbar hide ─── */
::-webkit-scrollbar { display: none; }
</style>
</head>
<body>

<!-- Layers -->
<div id="atmosphere"></div>
<div id="scanline"></div>
<canvas id="particleCanvas"></canvas>
<canvas id="gestureCanvas"></canvas>
<div id="cursor"></div>
<div id="cursor-dot"></div>
<div id="cursor-cross"></div>

<!-- Cinematic framing brackets -->
<div class="corner-bracket tl"></div>
<div class="corner-bracket tr"></div>
<div class="corner-bracket bl"></div>
<div class="corner-bracket br"></div>

<!-- Top bar -->
<div id="top-bar">
  <div class="brand">Dev<span>Glide</span></div>
  <div class="top-center">Gesture Interface v2.0</div>
  <div class="status">
    <span class="live-dot"></span>
    SYSTEM ACTIVE
  </div>
</div>

<!-- HUD readouts -->
<div id="velocity-indicator">VEL 0.0</div>
<div id="perspective-readout">FOV 900</div>

<!-- SVG connections -->
<svg id="connections-svg"></svg>

<!-- 3D Scene -->
<div id="scene-wrapper">
  <div id="scene">
    <div id="scene-inner">
      <!-- Panels injected by JS -->
    </div>
  </div>
</div>

<!-- Timeline -->
<div id="timeline">
  <div id="timeline-track">
    <div class="timeline-line"></div>
    <div id="timeline-progress"></div>
  </div>
</div>

<!-- Zoom controls -->
<div id="zoom-controls">
  <div class="zoom-btn" id="zoom-in">+</div>
  <div class="zoom-label" id="zoom-val">900</div>
  <div class="zoom-btn" id="zoom-out">&minus;</div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   MINORITY REPORT ENGINE
   Panel physics, gesture trails, particle system, connections
   ═══════════════════════════════════════════════════════════════ */
(function() {
  'use strict';

  // ─── Global State ───
  const state = {
    mouseX: window.innerWidth / 2,
    mouseY: window.innerHeight / 2,
    prevMouseX: window.innerWidth / 2,
    prevMouseY: window.innerHeight / 2,
    smoothX: window.innerWidth / 2,
    smoothY: window.innerHeight / 2,
    velocity: 0,
    perspective: 900,
    timelineIndex: 3,
    hoveredPanel: null,

  // ─── Build Chart SVG ───
  function buildChart() {
    const maxVal = Math.max(...chartData) * 1.1;
    const pad = { top: 18, right: 15, bottom: 28, left: 32 };
    const w = 370, h = 185;
    const plotW = w - pad.left - pad.right;
    const plotH = h - pad.top - pad.bottom;

    const points = chartData.map((v, i) => ({
      x: pad.left + (i / (chartData.length - 1)) * plotW,
      y: pad.top + plotH - (v / maxVal) * plotH,
    }));

    // Smooth curve through points (catmull-rom to bezier)
    function catmullRomToBezier(pts) {
      let d = `M${pts[0].x},${pts[0].y}`;
      for (let i = 0; i < pts.length - 1; i++) {
        const p0 = pts[Math.max(i - 1, 0)];
        const p1 = pts[i];
        const p2 = pts[i + 1];
        const p3 = pts[Math.min(i + 2, pts.length - 1)];
        const tension = 0.3;
        const cp1x = p1.x + (p2.x - p0.x) * tension;
        const cp1y = p1.y + (p2.y - p0.y) * tension;
        const cp2x = p2.x - (p3.x - p1.x) * tension;
        const cp2y = p2.y - (p3.y - p1.y) * tension;
        d += ` C${cp1x},${cp1y} ${cp2x},${cp2y} ${p2.x},${p2.y}`;
      }
      return d;
    }

    const curvePath = catmullRomToBezier(points);
    const areaPath = curvePath + ` L${points[points.length-1].x},${pad.top + plotH} L${points[0].x},${pad.top + plotH} Z`;

    let gridLines = '';
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + (i / 4) * plotH;
      const val = Math.round(maxVal - (i / 4) * maxVal);
      gridLines += `<line x1="${pad.left}" y1="${y}" x2="${pad.left + plotW}" y2="${y}" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>`;
      gridLines += `<text x="${pad.left - 6}" y="${y + 3}" text-anchor="end" fill="rgba(255,255,255,0.15)" font-size="7" font-family="JetBrains Mono">${val}</text>`;
    }

    let labels = '';
    points.forEach((p, i) => {
      labels += `<text x="${p.x}" y="${pad.top + plotH + 16}" text-anchor="middle" fill="rgba(255,255,255,0.2)" font-size="8" font-family="JetBrains Mono">${chartLabels[i]}</text>`;
    });

    let dots = '';
    points.forEach((p) => {
      dots += `<circle cx="${p.x}" cy="${p.y}" r="2" fill="var(--accent)" opacity="0.6"/>`;
      dots += `<circle cx="${p.x}" cy="${p.y}" r="5" fill="var(--accent)" opacity="0.08"/>`;
    });

    return `
      <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="var(--accent)" stop-opacity="0.005"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        ${gridLines}
        <path d="${areaPath}" fill="url(#areaGrad)"/>
        <path d="${curvePath}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-opacity="0.45" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
        ${dots}
        ${labels}
      </svg>
    `;
  }

  // ─── Gesture Trail ───
  function addTrailPoint(x, y) {
    const speed = state.velocity;
    state.trailPoints.push({
      x, y,
      life: 1.0,
      baseSize: 5 + Math.min(speed * 0.8, 12),
      brightness: Math.min(0.4 + speed * 0.02, 0.9),
    });
    if (state.trailPoints.length > 60) state.trailPoints.shift();
  }

  function drawGestureTrail() {
    gestureCtx.clearRect(0, 0, gestureCanvas.width, gestureCanvas.height);

    const pts = state.trailPoints;
    if (pts.length < 2) return;

    // Connecting ribbon
    gestureCtx.beginPath();
    gestureCtx.lineWidth = 1.2;
    let started = false;
    for (let i = 0; i < pts.length; i++) {
      const p = pts[i];
      if (p.life <= 0.05) continue;
      if (!started) { gestureCtx.moveTo(p.x, p.y); started = true; }
      else gestureCtx.lineTo(p.x, p.y);
    }
    gestureCtx.strokeStyle = 'rgba(68, 136, 204, 0.08)';
    gestureCtx.stroke();

    // Glow points
    for (let i = pts.length - 1; i >= 0; i--) {
      const p = pts[i];
      p.life -= 0.02;
      if (p.life <= 0) continue;

      const alpha = p.life * p.brightness;
      const size = p.baseSize * p.life;

      // Outer glow
      const grad = gestureCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, size * 2.5);
      grad.addColorStop(0, `rgba(68, 136, 204, ${alpha * 0.3})`);
      grad.addColorStop(0.4, `rgba(68, 136, 204, ${alpha * 0.08})`);
      grad.addColorStop(1, 'rgba(68, 136, 204, 0)');
      gestureCtx.beginPath();
      gestureCtx.fillStyle = grad;
      gestureCtx.arc(p.x, p.y, size * 2.5, 0, Math.PI * 2);
      gestureCtx.fill();

      // Core
      gestureCtx.beginPath();
      gestureCtx.fillStyle = `rgba(255, 255, 255, ${alpha * 0.7})`;
      gestureCtx.arc(p.x, p.y, size * 0.2, 0, Math.PI * 2);
      gestureCtx.fill();
    }

    state.trailPoints = state.trailPoints.filter(p => p.life > 0);

    // Cursor glow (at current mouse position)
    const cg = gestureCtx.createRadialGradient(state.mouseX, state.mouseY, 0, state.mouseX, state.mouseY, 30);
    cg.addColorStop(0, 'rgba(68, 136, 204, 0.06)');
    cg.addColorStop(1, 'rgba(68, 136, 204, 0)');
    gestureCtx.beginPath();
    gestureCtx.fillStyle = cg;
    gestureCtx.arc(state.mouseX, state.mouseY, 30, 0, Math.PI * 2);
    gestureCtx.fill();
  }

  // ─── Particle System (ambient dust) ───
  function initParticles(count) {
    state.particles = [];
    for (let i = 0; i < count; i++) {
      state.particles.push({
        x: Math.random() * W(),
        y: Math.random() * H(),
        vx: (Math.random() - 0.5) * 0.15,
        vy: (Math.random() - 0.5) * 0.1,
        size: Math.random() * 1.2 + 0.3,
        alpha: Math.random() * 0.12 + 0.02,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: Math.random() * 0.01 + 0.005,
      });
    }
  }

  initParticles(80);

  function drawParticles() {
    particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);

    state.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.pulse += p.pulseSpeed;

      // Wrap around
      if (p.x < -10) p.x = W() + 10;
      if (p.x > W() + 10) p.x = -10;
      if (p.y < -10) p.y = H() + 10;
      if (p.y > H() + 10) p.y = -10;

      // Subtle mouse repulsion
      const dx = p.x - state.smoothX;
      const dy = p.y - state.smoothY;
      const d = Math.sqrt(dx * dx + dy * dy);
      if (d < 100) {
        const force = (100 - d) / 100 * 0.3;
        p.x += (dx / d) * force;
        p.y += (dy / d) * force;
      }

      const flicker = (Math.sin(p.pulse) * 0.5 + 0.5) * 0.5 + 0.5;
      const alpha = p.alpha * flicker;

      particleCtx.beginPath();
      particleCtx.fillStyle = `rgba(255, 255, 255, ${alpha})`;
      particleCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      particleCtx.fill();
    });
  }

  // ─── Mouse Tracking ───
  const cursor = document.getElementById('cursor');
  const cursorDot = document.getElementById('cursor-dot');
  const cursorCross = document.getElementById('cursor-cross');
  let trailFrame = 0;

  document.addEventListener('mousemove', (e) => {
    state.prevMouseX = state.mouseX;
    state.prevMouseY = state.mouseY;
    state.mouseX = e.clientX;
    state.mouseY = e.clientY;

    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    cursorDot.style.left = e.clientX + 'px';
    cursorDot.style.top = e.clientY + 'px';
    cursorCross.style.left = e.clientX + 'px';
    cursorCross.style.top = e.clientY + 'px';

    trailFrame++;
    if (trailFrame % 2 === 0) {
      addTrailPoint(e.clientX, e.clientY);
    }
  });

  document.addEventListener('mousedown', () => {
    state.pressing = true;
    cursor.classList.add('pressing');
    cursorCross.classList.add('visible');
  });

  document.addEventListener('mouseup', () => {
    state.pressing = false;
    cursor.classList.remove('pressing');
    cursorCross.classList.remove('visible');
  });

  // Hover state for cursor ring
  document.addEventListener('mouseover', (e) => {
    const isInteractive = e.target.closest('.glass-panel, .zoom-btn, .timeline-node');
    cursor.classList.toggle('hovering', !!isInteractive);
  });

  // ─── Zoom ───
  const zoomVal = document.getElementById('zoom-val');
  const perspReadout = document.getElementById('perspective-readout');

  function setZoom(val) {
    state.perspective = clamp(val, 350, 2000);
    document.getElementById('scene').style.perspective = state.perspective + 'px';
    zoomVal.textContent = Math.round(state.perspective);
    perspReadout.textContent = 'FOV ' + Math.round(state.perspective);
  }

  document.getElementById('zoom-in').addEventListener('click', () => setZoom(state.perspective - 80));
  document.getElementById('zoom-out').addEventListener('click', () => setZoom(state.perspective + 80));

  document.addEventListener('wheel', (e) => {
    if (e.target.closest('#timeline')) return;
    setZoom(state.perspective + e.deltaY * 0.4);
  }, { passive: true });

  // ─── Keyboard ───
  document.addEventListener('keydown', (e) => {
    if (e.key === '+' || e.key === '=') setZoom(state.perspective - 80);
    else if (e.key === '-') setZoom(state.perspective + 80);
    else if (e.key === 'ArrowLeft') updateTimeline(state.timelineIndex - 1);
    else if (e.key === 'ArrowRight') updateTimeline(state.timelineIndex + 1);
    else if (e.key === '0') setZoom(900); // reset
  });

  // ─── Panel click to cascade front ───
  document.querySelectorAll('.glass-panel').forEach(el => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.glass-panel').forEach(p => p.style.zIndex = '');
      el.style.zIndex = '150';
      setTimeout(() => { el.style.zIndex = ''; }, 3000);
    });
  });

  // ─── HUD elements ───
  const velocityEl = document.getElementById('velocity-indicator');

  // ─── Main Animation Loop ───
  const sceneInner_ref = document.getElementById('scene-inner');

  function animate() {
    state.time++;

    // Velocity calculation
    const vx = state.mouseX - state.prevMouseX;
    const vy = state.mouseY - state.prevMouseY;
    const rawVel = Math.sqrt(vx * vx + vy * vy);
    state.velocity = lerp(state.velocity, rawVel, 0.15);

    // Smooth mouse
    state.smoothX = lerp(state.smoothX, state.mouseX, 0.07);
    state.smoothY = lerp(state.smoothY, state.mouseY, 0.07);

    // Scene tilt from mouse position
    const tiltX = ((state.smoothY / H()) - 0.5) * -5;
    const tiltY = ((state.smoothX / W()) - 0.5) * 7;
    sceneInner_ref.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;

    // Panel push/pull physics
    let anyPulled = false;
    state.panels.forEach(p => {
      const pcx = p.centerX;
      const pcy = p.centerY;
      const d = dist(state.mouseX, state.mouseY, pcx, pcy);

      const hoverR = Math.max(p.def.w, p.def.h) * 0.6;
      const pushR = Math.max(p.def.w, p.def.h) * 2.2;

      let targetZ = p.def.z;
      let targetScale = 1;
      let targetOpacity = p.def.opacity;
      let isPulled = false;
      let isActive = false;

      if (d < hoverR) {
        // Direct hover: PULL toward viewer
        const factor = 1 - (d / hoverR);
        const pullAmount = state.pressing ? 55 : 35;
        targetZ = p.def.z + pullAmount * factor;
        targetScale = 1 + (state.pressing ? 0.06 : 0.04) * factor;
        targetOpacity = clamp(p.def.opacity + 0.25 * factor, 0, 1);
        isPulled = true;
        isActive = true;
        state.hoveredPanel = p.def.id;
        anyPulled = true;
      } else if (d < pushR) {
        // Proximity: PUSH away (ripple effect)
        const factor = 1 - ((d - hoverR) / (pushR - hoverR));
        targetZ = p.def.z - 25 * factor * factor;
        isActive = d < pushR * 0.5;
      }

      // Spring physics for smooth transitions
      const springK = 0.08;
      const damping = 0.75;

      p.velZ = (p.velZ + (targetZ - p.currentZ) * springK) * damping;
      p.currentZ += p.velZ;

      p.velScale = (p.velScale + (targetScale - p.currentScale) * springK) * damping;
      p.currentScale += p.velScale;

      p.currentOpacity = lerp(p.currentOpacity, targetOpacity, 0.06);

      // Subtle idle floating
      const floatY = Math.sin(state.time * 0.008 + p.def.delay * 0.01) * 2;
      const floatX = Math.cos(state.time * 0.006 + p.def.delay * 0.008) * 1;

      // Apply transform
      const tx = p.baseLeft + floatX;
      const ty = p.baseTop + floatY;
      p.el.style.transform = `translate3d(${tx}px, ${ty}px, ${p.currentZ}px) rotateY(${p.def.rotateY}deg) rotateX(${p.def.rotateX || 0}deg) scale(${p.currentScale})`;
      p.el.style.opacity = p.currentOpacity;

      p.el.classList.toggle('pulled', isPulled);
      p.el.classList.toggle('active', isActive && !isPulled);
    });

    if (!anyPulled) state.hoveredPanel = null;

    // Connection glow logic
    state.connections.forEach(c => {
      const isHovered = state.hoveredPanel && c.def.panels.includes(state.hoveredPanel);
      c.line.classList.toggle('glow', isHovered);

      // Anchor dots
      [c.def.from, c.def.to].forEach(id => {
        const dot = document.querySelector(`[data-conn-id="${id}"]`);
        if (dot) dot.classList.toggle('glow', isHovered);
      });
    });

    // Update connection line positions
    updateConnections();

    // Draw layers
    drawGestureTrail();
    drawParticles();

    // Update HUD
    if (state.time % 6 === 0) {
      velocityEl.textContent = 'VEL ' + state.velocity.toFixed(1);
    }

    requestAnimationFrame(animate);
  }

  requestAnimationFrame(animate);

})();
</script>
</body>
</html>
